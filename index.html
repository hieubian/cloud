<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảo Bối Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.3);
            --option-bg: rgba(255, 255, 255, 0.6);
            --option-hover: #e0e7ff;
            --correct-bg: #d1fae5;
            --correct-border: #10b981;
            --wrong-bg: #fee2e2;
            --wrong-border: #ef4444;
            --progress-bg: #e5e7eb;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --accent: #f59e0b;
        }

        [data-theme="dark"] {
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --bg-color: #111827;
            --text-color: #f9fafb;
            --card-bg: rgba(31, 41, 55, 0.85);
            --card-border: rgba(255, 255, 255, 0.05);
            --option-bg: rgba(55, 65, 81, 0.6);
            --option-hover: #4b5563;
            --correct-bg: rgba(16, 185, 129, 0.2);
            --wrong-bg: rgba(239, 68, 68, 0.2);
            --progress-bg: #374151;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        }

        [data-theme="light"] body {
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,90%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,80%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,80%,1) 0, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: -webkit-linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            outline: none;
        }

        /* Screens */
        .screen {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Start Screen */
        .settings-group {
            margin-bottom: 25px;
        }

        .settings-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: var(--option-bg);
            color: var(--text-color);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: rgba(79, 70, 229, 0.1);
        }

        /* Quiz Screen */
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: var(--progress-bg);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #6b7280;
        }

        [data-theme="dark"] .quiz-header {
            color: #9ca3af;
        }

        .timer {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-color);
        }

        .timer.warning {
            color: var(--wrong-border);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option {
            padding: 16px 20px;
            border-radius: 12px;
            background: var(--option-bg);
            border: 2px solid transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.05rem;
            transition: all 0.2s;
        }

        .option:hover {
            background: var(--option-hover);
        }

        .option.selected {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.1);
        }

        .option.correct {
            background: var(--correct-bg);
            border-color: var(--correct-border);
        }

        .option.wrong {
            background: var(--wrong-bg);
            border-color: var(--wrong-border);
        }

        .option-letter {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.05);
            border-radius: 50%;
            font-weight: 600;
        }

        [data-theme="dark"] .option-letter {
            background: rgba(255,255,255,0.1);
        }

        .quiz-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        /* Results Screen */
        .results-summary {
            text-align: center;
            margin-bottom: 40px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(var(--primary) 0%, var(--progress-bg) 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative;
        }

        .score-circle::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: var(--card-bg);
            border-radius: 50%;
        }

        .score-text {
            position: relative;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--option-bg);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-card.correct .stat-value { color: var(--correct-border); }
        .stat-card.wrong .stat-value { color: var(--wrong-border); }
        .stat-card.skipped .stat-value { color: #9ca3af; }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Review Mode */
        .review-list {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .review-list::-webkit-scrollbar {
            width: 8px;
        }
        
        .review-list::-webkit-scrollbar-track {
            background: var(--progress-bg);
            border-radius: 4px;
        }
        
        .review-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        .review-item {
            background: var(--option-bg);
            padding: 20px;
            border-radius: 16px;
            border-left: 4px solid var(--progress-bg);
        }

        .review-item.correct { border-left-color: var(--correct-border); }
        .review-item.wrong { border-left-color: var(--wrong-border); }

        .review-q {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .review-ans {
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 10px;
        }

        .badge-correct { background: var(--correct-bg); color: var(--correct-border); }
        .badge-wrong { background: var(--wrong-bg); color: var(--wrong-border); }

        .list-item { background: var(--option-bg); padding: 20px; border-radius: 16px; margin-bottom: 15px; border-left: 4px solid var(--primary); }
        .list-question { font-weight: 600; margin-bottom: 10px; }
        .list-answer { color: var(--correct-border); font-weight: 600; }
        .search-bar { width: 100%; margin-bottom: 20px; padding: 12px; border-radius: 12px; border: 1px solid var(--card-border); background: var(--option-bg); color: var(--text-color); font-size: 1rem; outline: none; }

        @media (max-width: 600px) {
            .container { padding: 25px; }
            .stats-grid { grid-template-columns: 1fr; }
            .quiz-footer { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><i class="fa-solid fa-cloud"></i> Bảo Bối Cloud</h1>
            <button class="theme-toggle" onclick="toggleTheme()" title="Chuyển giao diện">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>

        <!-- SCREEN 1: START -->
        <div id="start-screen" class="screen active">
            <h2 style="margin-bottom: 20px;">Cài đặt bài thi</h2>
            
            <div class="settings-group">
                <label>Chế độ ôn tập</label>
                <select id="setting-mode">
                    <option value="practice" selected>Luyện tập (Hiển thị đáp án ngay)</option>
                    <option value="test">Thi trắc nghiệm (Có tính giờ)</option>
                </select>
            </div>

            <div class="settings-group">
                <label>Số lượng câu hỏi</label>
                <select id="setting-count">
                    <option value="all">Tất cả (172 câu)</option>
                    <option value="20">20 câu</option>
                    <option value="40">40 câu</option>
                    <option value="45">45 câu</option>
                    <option value="50">50 câu</option>
                </select>
            </div>

            <div class="settings-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="setting-random-q" checked>
                    Xáo trộn thứ tự câu hỏi
                </label>
                <label class="checkbox-label" style="margin-top: 10px;">
                    <input type="checkbox" id="setting-random-o" checked>
                    Xáo trộn thứ tự đáp án
                </label>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 10px; flex-direction: column;">
                <button class="btn" onclick="startQuiz()">
                    <i class="fa-solid fa-play"></i> Bắt đầu làm bài
                </button>
                <button class="btn btn-outline" onclick="showReadMode()">
                    <i class="fa-solid fa-book-open"></i> Đọc tài liệu
                </button>
            </div>
        </div>

        <!-- SCREEN 2: QUIZ -->
        <div id="quiz-screen" class="screen">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="quiz-header">
                <span id="question-tracker">Câu 1 / 20</span>
                <span class="timer" id="timer" style="display: none;"><i class="fa-regular fa-clock"></i> 00:00</span>
            </div>

            <div class="question-text" id="question-text">
                Nội dung câu hỏi sẽ hiển thị ở đây?
            </div>

            <div class="options" id="options-container">
                <!-- Options injected via JS -->
            </div>

            <div class="quiz-footer">
                <button class="btn btn-outline" id="btn-prev" onclick="prevQuestion()" style="display: none;">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại
                </button>
                <button class="btn btn-outline" id="btn-skip" onclick="nextQuestion()">
                    Bỏ qua <i class="fa-solid fa-forward"></i>
                </button>
                <button class="btn" id="btn-next" onclick="nextQuestion()" style="display: none;">
                    Tiếp theo <i class="fa-solid fa-arrow-right"></i>
                </button>
                <button class="btn" id="btn-finish" onclick="finishQuiz()" style="display: none; background: #10b981;">
                    Nộp bài <i class="fa-solid fa-check"></i>
                </button>
            </div>
        </div>

        <!-- SCREEN 3: RESULTS -->
        <div id="results-screen" class="screen">
            <h2 style="text-align: center; margin-bottom: 30px;">Kết quả bài thi</h2>
            
            <div class="results-summary">
                <div class="score-circle" id="score-circle">
                    <div class="score-text" id="score-text">0%</div>
                </div>
                <h3 id="score-msg" style="margin-bottom: 10px;">Hoàn thành xuất sắc!</h3>
            </div>

            <div class="stats-grid">
                <div class="stat-card correct">
                    <div class="stat-value" id="stat-correct">0</div>
                    <div class="stat-label">Câu đúng</div>
                </div>
                <div class="stat-card wrong">
                    <div class="stat-value" id="stat-wrong">0</div>
                    <div class="stat-label">Câu sai</div>
                </div>
                <div class="stat-card skipped">
                    <div class="stat-value" id="stat-skipped">0</div>
                    <div class="stat-label">Bỏ qua</div>
                </div>
            </div>

            <div class="quiz-footer">
                <button class="btn btn-outline" onclick="showReview()">
                    <i class="fa-solid fa-magnifying-glass"></i> Xem chi tiết
                </button>
                <button class="btn" onclick="location.reload()">
                    <i class="fa-solid fa-rotate-right"></i> Thi lại
                </button>
            </div>
        </div>

        <!-- SCREEN 4: REVIEW -->
        <div id="review-screen" class="screen">
            <div class="header" style="margin-bottom: 20px;">
                <h2>Chi tiết các câu</h2>
                <button class="btn btn-outline" style="width: auto; padding: 8px 16px;" onclick="showResults()">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại
                </button>
            </div>
            
            <div class="review-list" id="review-list">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- SCREEN 5: READ MODE -->
        <div id="read-screen" class="screen">
            <div class="header" style="margin-bottom: 20px;">
                <h2>Tài liệu ôn tập</h2>
                <button class="btn btn-outline" style="width: auto; padding: 8px 16px;" onclick="switchScreen('start-screen')">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại
                </button>
            </div>
            <input type="text" id="search-input" class="search-bar" placeholder="🔍 Tìm kiếm câu hỏi..." oninput="filterReadList()">
            <div class="review-list" id="read-list">
                <!-- Injected via JS -->
            </div>
        </div>

    </div>

        let activeQuestions = [];
        let currentIdx = 0;
        let userAnswers = []; // Array to store user's selected option index (relative to the activeQuestion options array)
        let mode = 'test'; // 'test' or 'practice'
        let timerInterval;
        let timeRemaining = 0; // in seconds

        // Initialize Theme
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (prefersDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.querySelector('.theme-toggle').innerHTML = '<i class="fa-solid fa-sun"></i>';
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            document.querySelector('.theme-toggle').innerHTML = '<i class="fa-solid fa-moon"></i>';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            document.querySelector('.theme-toggle').innerHTML = target === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        }

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startQuiz() {
            // Get settings
            mode = document.getElementById('setting-mode').value;
            const countVal = document.getElementById('setting-count').value;
            const randQ = document.getElementById('setting-random-q').checked;
            const randO = document.getElementById('setting-random-o').checked;

            // Prepare questions
            let questions = [...rawQuizData];
            if (randQ) {
                questions = shuffleArray(questions);
            }
            
            const count = countVal === 'all' ? questions.length : parseInt(countVal);
            activeQuestions = questions.slice(0, count);

            // Scramble options if requested and preserve correct answer
            activeQuestions = activeQuestions.map(q => {
                let optionsData = q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.correctAnswerIndex }));
                if (randO) {
                    optionsData = shuffleArray(optionsData);
                }
                return {
                    id: q.id,
                    question: q.question,
                    options: optionsData.map(o => o.text),
                    correctAnswerIndex: optionsData.findIndex(o => o.isCorrect)
                };
            });

            userAnswers = new Array(activeQuestions.length).fill(null);
            currentIdx = 0;

            // Setup Timer for test mode
            if (mode === 'test') {
                document.getElementById('timer').style.display = 'block';
                timeRemaining = count * 60; // 1 minute per question
                updateTimerDisplay();
                timerInterval = setInterval(timerTick, 1000);
            } else {
                document.getElementById('timer').style.display = 'none';
            }

            switchScreen('quiz-screen');
            loadQuestion();
        }

        function timerTick() {
            if (timeRemaining > 0) {
                timeRemaining--;
                updateTimerDisplay();
            } else {
                clearInterval(timerInterval);
                alert("Hết giờ làm bài!");
                finishQuiz();
            }
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const s = (timeRemaining % 60).toString().padStart(2, '0');
            const timerEl = document.getElementById('timer');
            timerEl.innerHTML = `<i class="fa-regular fa-clock"></i> ${m}:${s}`;
            
            if (timeRemaining <= 60) {
                timerEl.classList.add('warning');
            } else {
                timerEl.classList.remove('warning');
            }
        }

        function loadQuestion() {
            const q = activeQuestions[currentIdx];
            document.getElementById('question-tracker').innerText = `Câu ${currentIdx + 1} / ${activeQuestions.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            // Update progress bar
            const progress = ((currentIdx) / activeQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';

            const letters = ['A', 'B', 'C', 'D', 'E', 'F'];

            q.options.forEach((opt, idx) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                
                // If in practice mode and user already answered, show correct/wrong
                let isAlreadyAnsweredInPractice = mode === 'practice' && userAnswers[currentIdx] !== null;

                if (userAnswers[currentIdx] === idx) {
                    optDiv.classList.add('selected');
                    if (isAlreadyAnsweredInPractice) {
                        if (idx === q.correctAnswerIndex) {
                            optDiv.classList.add('correct');
                        } else {
                            optDiv.classList.add('wrong');
                        }
                    }
                }

                if (isAlreadyAnsweredInPractice && idx === q.correctAnswerIndex && userAnswers[currentIdx] !== idx) {
                    optDiv.classList.add('correct');
                }

                optDiv.innerHTML = `
                    <div class="option-letter">${letters[idx]}</div>
                    <div class="option-text">${opt}</div>
                `;

                if (!isAlreadyAnsweredInPractice) {
                    optDiv.onclick = () => selectOption(idx);
                }
                
                optsContainer.appendChild(optDiv);
            });

            updateNavButtons();
        }

        function selectOption(idx) {
            userAnswers[currentIdx] = idx;
            
            if (mode === 'practice') {
                // Instantly show result and freeze options
                loadQuestion(); 
            } else {
                // Just highlight selected
                const opts = document.querySelectorAll('.option');
                opts.forEach(o => o.classList.remove('selected'));
                opts[idx].classList.add('selected');
            }
            updateNavButtons();
        }

        function updateNavButtons() {
            document.getElementById('btn-prev').style.display = currentIdx > 0 ? 'inline-flex' : 'none';
            
            const btnSkip = document.getElementById('btn-skip');
            const btnNext = document.getElementById('btn-next');
            const btnFinish = document.getElementById('btn-finish');

            if (currentIdx === activeQuestions.length - 1) {
                btnSkip.style.display = 'none';
                btnNext.style.display = 'none';
                btnFinish.style.display = 'inline-flex';
            } else {
                btnFinish.style.display = 'none';
                if (userAnswers[currentIdx] !== null) {
                    btnSkip.style.display = 'none';
                    btnNext.style.display = 'inline-flex';
                } else {
                    btnSkip.style.display = 'inline-flex';
                    btnNext.style.display = 'none';
                }
            }
        }

        function nextQuestion() {
            if (currentIdx < activeQuestions.length - 1) {
                currentIdx++;
                loadQuestion();
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                loadQuestion();
            }
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            
            let correct = 0;
            let wrong = 0;
            let skipped = 0;

            userAnswers.forEach((ans, idx) => {
                if (ans === null) skipped++;
                else if (ans === activeQuestions[idx].correctAnswerIndex) correct++;
                else wrong++;
            });

            document.getElementById('stat-correct').innerText = correct;
            document.getElementById('stat-wrong').innerText = wrong;
            document.getElementById('stat-skipped').innerText = skipped;

            const percentage = Math.round((correct / activeQuestions.length) * 100);
            document.getElementById('score-text').innerText = `${percentage}%`;
            
            const circle = document.getElementById('score-circle');
            circle.style.background = `conic-gradient(var(--primary) ${percentage}%, var(--progress-bg) ${percentage}%)`;

            let msg = '';
            if (percentage >= 90) msg = 'Tuyệt vời! Kiến thức rất vững vàng.';
            else if (percentage >= 70) msg = 'Rất tốt! Cố gắng thêm chút nữa nhé.';
            else if (percentage >= 50) msg = 'Khá ổn, cần ôn tập thêm một số phần.';
            else msg = 'Cần nỗ lực nhiều hơn, hãy xem lại lý thuyết!';
            document.getElementById('score-msg').innerText = msg;

            switchScreen('results-screen');
            buildReviewList();
        }

        function buildReviewList() {
            const list = document.getElementById('review-list');
            list.innerHTML = '';

            const letters = ['A', 'B', 'C', 'D', 'E', 'F'];

            activeQuestions.forEach((q, idx) => {
                const uAns = userAnswers[idx];
                const cAns = q.correctAnswerIndex;
                const isCorrect = uAns === cAns;
                const isSkipped = uAns === null;

                const item = document.createElement('div');
                item.className = `review-item ${isSkipped ? '' : (isCorrect ? 'correct' : 'wrong')}`;

                let html = `
                    <div class="review-q">Câu ${idx + 1}: ${q.question}</div>
                `;

                if (isSkipped) {
                    html += `<div class="badge" style="background: var(--progress-bg);">Chưa làm</div>`;
                } else if (isCorrect) {
                    html += `<div class="badge badge-correct">Đúng</div>`;
                } else {
                    html += `<div class="badge badge-wrong">Sai</div>`;
                }

                html += `<div style="margin-top: 10px;">`;
                html += `<div class="review-ans"><b>Đáp án đúng:</b> ${letters[cAns]}. ${q.options[cAns]}</div>`;
                
                if (!isCorrect && !isSkipped) {
                    html += `<div class="review-ans" style="color: var(--wrong-border);"><b>Bạn chọn:</b> ${letters[uAns]}. ${q.options[uAns]}</div>`;
                }
                html += `</div>`;

                item.innerHTML = html;
                list.appendChild(item);
            });
        }

        function showReview() { switchScreen('review-screen'); }
        function showResults() { switchScreen('results-screen'); }

        function showReadMode() {
            const list = document.getElementById('read-list');
            list.innerHTML = '';
            
            rawQuizData.forEach(q => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <div class="list-question">Câu ${q.id}: ${q.question}</div>
                    <div class="list-answer"><i class="fa-solid fa-check"></i> ${q.options[q.correctAnswerIndex]}</div>
                `;
                list.appendChild(item);
            });
            document.getElementById('search-input').value = '';
            switchScreen('read-screen');
        }

        function filterReadList() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const items = document.querySelectorAll('#read-list .list-item');
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = text.includes(term) ? 'block' : 'none';
            });
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
